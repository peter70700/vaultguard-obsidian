name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbidden-artifacts:
    # Standalone, intentionally independent of build-test-lint. On the public
    # monorepo (where this workflow file is copied via export) it fails the
    # push when a Terraform state / plan / dev-tfvars file lands in the tree.
    #
    # Skipped on this private source repo for the same reason build-test-lint
    # is: the private repo's runners never come online (pre-existing quota /
    # availability issue — jobs queue, get a runner ID, then exit with no
    # step logs). Defence-in-depth on the private side comes from
    # scripts/git-hooks/pre-commit (auto-installed via npm prepare) and the
    # post-copy validator in scripts/export-public-server-repo.mjs.
    if: github.repository != 'peter70700/vaultguard-obsidian-plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refuse Terraform state/plan/dev-tfvars in tree
        run: |
          set -euo pipefail
          # (^|/)terraform/ — NOT ^terraform/. This file is exported verbatim into
          # the public monorepo where terraform lives at packages/server/terraform/,
          # so an apex-anchored regex would never match a nested path and the guard
          # would be inert (RL2). The `/`-alternative catches the nested path; the
          # `^`-alternative still catches a root-level terraform/ (private repo).
          forbidden_regex='(^|/)terraform/(.*\.tfstate(\.[^/]+)?$|tfplan$|.*\.tfplan$|terraform\.tfvars$|.*\.auto\.tfvars$|\.terraform/|\.terraform\.tfstate\.lock\.info$)'
          violations="$(git ls-files | grep -E "$forbidden_regex" || true)"
          if [[ -n "$violations" ]]; then
            echo "::error::Tracked Terraform state/plan/dev-tfvars artifacts found:"
            printf '%s\n' $violations | while read -r f; do echo "::error file=$f::forbidden artifact tracked in git"; done
            exit 1
          fi
          echo "OK: no forbidden Terraform artifacts in tree."

  build-test-lint:
    # The job body targets the public monorepo's packages/{plugin,server}/
    # layout. This file is the single source of truth (CONTEXT.md D-40) and
    # is copied verbatim into the monorepo via export-public-monorepo.mjs.
    #
    # On THIS private repo the layout is flat (root package.json, src/,
    # infrastructure/) — the monorepo paths don't exist, so running these
    # steps here would always fail. The `if:` guard skips the job entirely
    # when the workflow runs on the private source repo, leaving the
    # forbidden-artifacts guard above as the only CI on this repo.
    if: github.repository != 'peter70700/vaultguard-obsidian-plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Lint (Biome)
        run: npx biome check .

      - name: Typecheck (plugin)
        run: npx tsc -p packages/plugin/tsconfig.json --noEmit

      # The server lambda code lives at packages/server/infrastructure/ — one
      # level below the workspace boundary (packages/server/ has no package.json
      # of its own). Workspace install at the root does NOT reach into
      # packages/server/infrastructure/, so its devDependencies (@types/node,
      # @types/aws-lambda, typescript) aren't on disk before this step. Run a
      # local install inside packages/server/infrastructure to populate them.
      - name: Install server (infrastructure) deps
        working-directory: packages/server/infrastructure
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck (server)
        run: npx tsc -p packages/server/infrastructure/tsconfig.json --noEmit

      - name: Test (Vitest)
        run: npm run -w vaultguard-sync test
