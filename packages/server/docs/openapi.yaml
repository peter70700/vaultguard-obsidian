openapi: 3.1.0
info:
  title: VaultGuard API
  version: 0.3.0
  description: |
    Source-derived API contract for the current VaultGuard repository.

    Source priority for this file is Lambda handlers, Terraform API Gateway
    resources, plugin/admin callers, tests, then docs. Schemas are conservative
    where handler responses intentionally contain dynamic maps or where caller
    and handler types still diverge.

    File, permission, audit, share, overview, and sync cursor routes are
    vault-scoped under `/vaults/{vaultId}/...`. Root `/files/*` and
    `/permissions/*` routes are stale and are not part of this contract.
servers:
  - url: https://your-api.example.com
    description: VaultGuard REST API base URL.

security:
  - cognitoIdToken: []

tags:
  - name: Discovery
  - name: Signup
  - name: Auth
  - name: Vaults
  - name: Files
  - name: Permissions
  - name: Audit
  - name: Users
  - name: Billing
  - name: Shares
  - name: ReEncryption

paths:
  /.well-known/vaultguard.json:
    get:
      tags: [Discovery]
      summary: Discover a Community or self-hosted VaultGuard server
      description: Returns public config for a single active Community Edition org.
      security: []
      responses:
        '200':
          description: Public well-known server config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellKnownConfigResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{slug}/config:
    parameters:
      - $ref: '#/components/parameters/Slug'
    get:
      tags: [Discovery]
      summary: Get public organization config by slug
      security: []
      responses:
        '200':
          description: Public organization config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgConfigResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{orgId}/config:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      tags: [Discovery]
      summary: Get public organization config by org id
      security: []
      responses:
        '200':
          description: Public organization config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgConfigResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /signup:
    post:
      tags: [Signup]
      summary: Create an organization, first owner, default vault, and owner membership
      security: []
      requestBody:
        $ref: '#/components/requestBodies/SignupRequest'
      responses:
        '201':
          description: Organization bootstrap created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Create a server session from the Authorization token
      description: Compatibility route handled by the auth Lambda. It validates the caller token and returns a session envelope, not an email/password token pair.
      requestBody:
        $ref: '#/components/requestBodies/AuthSessionRequest'
      responses:
        '200':
          description: Session envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/session:
    post:
      tags: [Auth]
      summary: Create a server session from the Authorization token
      description: Preferred plugin/API-client session route. Returns the server-session envelope only; Cognito tokens and vault key leases are obtained through separate flows.
      requestBody:
        $ref: '#/components/requestBodies/AuthSessionRequest'
      responses:
        '200':
          description: Session envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh session and key lease state
      requestBody:
        $ref: '#/components/requestBodies/AuthRefreshRequest'
      responses:
        '200':
          description: Refreshed session and key lease.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'

  /auth/logout:
    post:
      tags: [Auth]
      summary: End a server-side session
      requestBody:
        $ref: '#/components/requestBodies/AuthLogoutRequest'
      responses:
        '200':
          description: Logout result and cache-wipe signal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutResponse'

  /auth/key-lease:
    get:
      tags: [Auth]
      summary: Issue the default key lease for a session
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
        - in: query
          name: vaultId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Issued key lease.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyLeaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/key-lease/scoped:
    post:
      tags: [Auth]
      summary: Issue a path-scoped key lease
      requestBody:
        $ref: '#/components/requestBodies/ScopedKeyLeaseRequest'
      responses:
        '200':
          description: Issued scoped key lease.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyLeaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/revoke:
    post:
      tags: [Auth]
      summary: Admin revocation entry point
      requestBody:
        $ref: '#/components/requestBodies/AuthRevokeRequest'
      responses:
        '200':
          description: Revocation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRevokeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/leases:
    get:
      tags: [Auth]
      summary: List leases for a target user
      parameters:
        - in: query
          name: targetUserId
          required: true
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lease list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLeasesResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/heartbeat:
    get:
      tags: [Auth]
      summary: Session and revocation heartbeat
      parameters:
        - in: query
          name: sessionId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Heartbeat status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthHeartbeatResponse'

  /auth/setup-zk:
    post:
      tags: [Auth]
      summary: Configure hybrid zero-knowledge encryption for the caller
      requestBody:
        $ref: '#/components/requestBodies/SetupZkRequest'
      responses:
        '200':
          description: ZK setup result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupZkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/wrapped-key:
    get:
      tags: [Auth]
      summary: Fetch wrapped user key material
      responses:
        '200':
          description: Wrapped key material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedKeyResponse'

  /auth/recover:
    post:
      tags: [Auth]
      summary: Recover user key material through admin recovery flow
      requestBody:
        $ref: '#/components/requestBodies/AuthRecoverRequest'
      responses:
        '200':
          description: Recovery payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRecoverResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Start password reset
      security: []
      requestBody:
        $ref: '#/components/requestBodies/ForgotPasswordRequest'
      responses:
        '200':
          description: Generic reset-start message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/confirm-reset:
    post:
      tags: [Auth]
      summary: Confirm password reset
      security: []
      requestBody:
        $ref: '#/components/requestBodies/ConfirmResetRequest'
      responses:
        '200':
          description: Reset-confirmed message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/recovery-codes:
    post:
      tags: [Auth]
      summary: Store hashed recovery codes
      requestBody:
        $ref: '#/components/requestBodies/RecoveryCodesStoreRequest'
      responses:
        '200':
          description: Recovery code storage result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryCodesStoreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/recovery-codes/verify:
    post:
      tags: [Auth]
      summary: Verify a recovery code
      security: []
      requestBody:
        $ref: '#/components/requestBodies/RecoveryCodeVerifyRequest'
      responses:
        '200':
          description: Recovery code accepted message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vaults:
    get:
      tags: [Vaults]
      summary: List visible vaults
      responses:
        '200':
          description: Visible vaults.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultListResponse'
    post:
      tags: [Vaults]
      summary: Create a vault
      requestBody:
        $ref: '#/components/requestBodies/VaultCreateRequest'
      responses:
        '201':
          description: Created vault.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vaults/{vaultId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Vaults]
      summary: Get vault details
      responses:
        '200':
          description: Vault record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Vaults]
      summary: Update vault metadata and settings
      requestBody:
        $ref: '#/components/requestBodies/VaultUpdateRequest'
      responses:
        '200':
          description: Updated vault.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultResponse'
    delete:
      tags: [Vaults]
      summary: Soft-archive vault
      responses:
        '200':
          description: Vault archive result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultArchiveResponse'

  /vaults/{vaultId}/members:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Vaults]
      summary: List vault members
      responses:
        '200':
          description: Vault members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultMembersResponse'
    post:
      tags: [Vaults]
      summary: Add a vault member
      requestBody:
        $ref: '#/components/requestBodies/VaultMemberAddRequest'
      responses:
        '201':
          description: Added vault membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultMembershipResponse'

  /vaults/{vaultId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Vaults]
      summary: Update a vault member role
      requestBody:
        $ref: '#/components/requestBodies/VaultMemberUpdateRequest'
      responses:
        '200':
          description: Updated vault membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultMembershipResponse'
    delete:
      tags: [Vaults]
      summary: Remove a vault member and revoke related leases
      responses:
        '200':
          description: Removed membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultMemberRemoveResponse'

  /vaults/{vaultId}/files:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Files]
      summary: List vault files
      parameters:
        - $ref: '#/components/parameters/Prefix'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ContinuationToken'
      responses:
        '200':
          description: File list page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'

  /vaults/{vaultId}/overview:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Files]
      summary: Get vault metadata overview
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ContinuationToken'
      responses:
        '200':
          description: Metadata-only vault overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultOverviewResponse'

  /vaults/{vaultId}/files/{path}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    get:
      tags: [Files]
      summary: Read an encrypted vault file
      responses:
        '200':
          description: Base64 encoded file content and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Files]
      summary: Write an encrypted vault file
      requestBody:
        $ref: '#/components/requestBodies/FileWriteRequest'
      responses:
        '200':
          description: Written file metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileWriteResponse'
    delete:
      tags: [Files]
      summary: Soft-delete a vault file
      responses:
        '200':
          description: Soft-delete result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'

  /vaults/{vaultId}/files/{path}/history:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    get:
      tags: [Files]
      summary: Get version history for a file
      responses:
        '200':
          description: Version history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileHistoryResponse'

  /vaults/{vaultId}/files/sync:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Files]
      summary: Compute server-side file sync deltas
      requestBody:
        $ref: '#/components/requestBodies/FileSyncRequest'
      responses:
        '200':
          description: Sync deltas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vaults/{vaultId}/sync-cursor:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Files]
      summary: Get the vault revision cursor
      responses:
        '200':
          description: Current vault sync cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncCursorResponse'

  /vaults/{vaultId}/files/deleted:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Files]
      summary: List soft-deleted files
      responses:
        '200':
          description: Deleted files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedFilesResponse'

  /vaults/{vaultId}/files/{path}/restore-delete:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    post:
      tags: [Files]
      summary: Restore the latest soft-deleted version
      responses:
        '200':
          description: Delete-marker restore result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreDeleteResponse'

  /vaults/{vaultId}/files/{path}/restore:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    post:
      tags: [Files]
      summary: Restore a specific historical version
      requestBody:
        $ref: '#/components/requestBodies/FileRestoreRequest'
      responses:
        '200':
          description: Version restore result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RestoreVersionResponse'
                  - $ref: '#/components/schemas/RestoreDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vaults/{vaultId}/files-decrypted/{path}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    get:
      tags: [Files]
      summary: Read server-side decrypted file content
      responses:
        '200':
          description: Decrypted file content and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDecryptedResponse'

  /vaults/{vaultId}/permissions:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Permissions]
      summary: List permission rules
      parameters:
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: pathFilter
          required: false
          schema:
            type: string
        - in: query
          name: effectFilter
          required: false
          schema:
            $ref: '#/components/schemas/PermissionEffect'
      responses:
        '200':
          description: Permission rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
    post:
      tags: [Permissions]
      summary: Create, upsert, or set-level a permission rule
      requestBody:
        $ref: '#/components/requestBodies/PermissionCreateRequest'
      responses:
        '200':
          description: Upserted or set-level permission result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PermissionRuleResponse'
                  - $ref: '#/components/schemas/PermissionSetLevelResponse'
        '201':
          description: Created permission rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCreateResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /vaults/{vaultId}/permissions/{id}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/PermissionId'
    put:
      tags: [Permissions]
      summary: Update a permission rule
      requestBody:
        $ref: '#/components/requestBodies/PermissionUpdateRequest'
      responses:
        '200':
          description: Updated permission rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionRuleResponse'
    delete:
      tags: [Permissions]
      summary: Delete a permission rule
      responses:
        '200':
          description: Deleted rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeleteResponse'

  /vaults/{vaultId}/permissions/user/{userId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Permissions]
      summary: List permission rules and effective permission summary for a user
      responses:
        '200':
          description: User permission rules and effective permission map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPermissionsResponse'

  /vaults/{vaultId}/permissions/check:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Permissions]
      summary: Check whether a user can perform an action on a path
      requestBody:
        $ref: '#/components/requestBodies/PermissionCheckRequest'
      responses:
        '200':
          description: Permission check result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCheckResponse'

  /vaults/{vaultId}/permissions/access:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Permissions]
      summary: Get backend-computed path access summary
      requestBody:
        $ref: '#/components/requestBodies/PathAccessRequest'
      responses:
        '200':
          description: Access summary for one path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PathAccessSummary'

  /vaults/{vaultId}/permissions/access/batch:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Permissions]
      summary: Get backend-computed path access summaries for many paths
      requestBody:
        $ref: '#/components/requestBodies/BatchPathAccessRequest'
      responses:
        '200':
          description: Access summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchPathAccessResponse'

  /vaults/{vaultId}/audit:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Audit]
      summary: Query vault audit logs
      responses:
        '200':
          description: Audit log page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPageResponse'

  /vaults/{vaultId}/audit/logs:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Audit]
      summary: Query vault audit logs
      responses:
        '200':
          description: Audit log page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPageResponse'

  /vaults/{vaultId}/audit/user/{userId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Audit]
      summary: Query audit activity for one user
      responses:
        '200':
          description: User audit activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditUserActivityResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /vaults/{vaultId}/audit/file/{path}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/FilePath'
    get:
      tags: [Audit]
      summary: Query audit activity for one file path
      responses:
        '200':
          description: File audit activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFileAccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /vaults/{vaultId}/audit/alerts:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Audit]
      summary: List security alerts
      responses:
        '200':
          description: Security alerts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditAlertsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /vaults/{vaultId}/audit/alerts/{alertId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/AlertId'
    patch:
      tags: [Audit]
      summary: Acknowledge or reopen an alert
      requestBody:
        $ref: '#/components/requestBodies/AuditAlertPatchRequest'
      responses:
        '200':
          description: Updated alert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditAlertResponse'

  /vaults/{vaultId}/audit/export:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Audit]
      summary: Export audit logs as CSV or JSON
      requestBody:
        $ref: '#/components/requestBodies/AuditExportRequest'
      responses:
        '200':
          description: CSV by default, JSON when the request body sets `format` to `json`.
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportJsonResponse'

  /vaults/{vaultId}/audit/report:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Audit]
      summary: Legacy alias for audit export
      requestBody:
        $ref: '#/components/requestBodies/AuditExportRequest'
      responses:
        '200':
          description: CSV by default, JSON when the request body sets `format` to `json`.
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportJsonResponse'

  /vaults/{vaultId}/audit/bridge:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    post:
      tags: [Audit]
      summary: Emit an agent-bridge lifecycle audit event
      requestBody:
        $ref: '#/components/requestBodies/AuditBridgeRequest'
      responses:
        '200':
          description: Bridge event logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditBridgeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users:
    get:
      tags: [Users]
      summary: List organization users
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserListEntry'

  /users/roles:
    get:
      tags: [Users]
      summary: List available roles
      responses:
        '200':
          description: Role list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleEntry'

  /users/invite:
    post:
      tags: [Users]
      summary: Invite a user
      requestBody:
        $ref: '#/components/requestBodies/UserInviteRequest'
      responses:
        '201':
          description: Invitation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInviteResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /users/{userId}/role:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      summary: Update a user's org role
      requestBody:
        $ref: '#/components/requestBodies/UserRoleUpdateRequest'
      responses:
        '200':
          description: Role update result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoleUpdateResponse'

  /users/{userId}/profile:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags: [Users]
      summary: Update a user's display name
      requestBody:
        $ref: '#/components/requestBodies/UserProfileUpdateRequest'
      responses:
        '200':
          description: Profile update result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileUpdateResponse'

  /users/{userId}/revoke:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Revoke a user's access
      responses:
        '200':
          description: Revoked user result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRevokeResponse'

  /users/{userId}/reactivate:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Reactivate a user
      requestBody:
        $ref: '#/components/requestBodies/UserReactivateRequest'
      responses:
        '200':
          description: Reactivated user result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReactivateResponse'

  /users/{userId}/resend-invite:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Resend an invitation
      responses:
        '200':
          description: Resend result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResendInviteResponse'

  /users/{userId}/activity:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: List recent user activity
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Recent user activity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserActivityEntry'

  /users/{userId}/reset-mfa:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Users]
      summary: Reset a user's MFA enrollment
      responses:
        '200':
          description: MFA reset result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResetMfaResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /orgs/{orgId}/settings:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      tags: [Users]
      summary: Get organization settings
      responses:
        '200':
          description: Organization settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgSettings'
    put:
      tags: [Users]
      summary: Update organization settings
      requestBody:
        $ref: '#/components/requestBodies/OrgSettingsUpdateRequest'
      responses:
        '200':
          description: Updated organization settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgSettings'
    delete:
      tags: [Users]
      summary: Reset organization settings to defaults
      responses:
        '200':
          description: Reset organization settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgSettings'

  /billing/subscription:
    get:
      tags: [Billing]
      summary: Get subscription state
      responses:
        '200':
          description: Subscription state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSubscriptionResponse'
        '404':
          $ref: '#/components/responses/BillingNotFound'
    post:
      tags: [Billing]
      summary: Sync subscription seats
      responses:
        '200':
          description: Seat sync result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSeatSyncResponse'
        '404':
          $ref: '#/components/responses/BillingNotFound'

  /billing/checkout:
    post:
      tags: [Billing]
      summary: Create a Stripe checkout session
      requestBody:
        $ref: '#/components/requestBodies/BillingCheckoutRequest'
      responses:
        '200':
          description: Checkout session URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCheckoutResponse'
        '404':
          $ref: '#/components/responses/BillingNotFound'

  /billing/portal:
    post:
      tags: [Billing]
      summary: Create a Stripe billing portal session
      responses:
        '200':
          description: Portal session URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPortalResponse'
        '404':
          $ref: '#/components/responses/BillingNotFound'

  /billing/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      security: []
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Webhook accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingWebhookResponse'
        '400':
          $ref: '#/components/responses/BillingBadRequest'

  /vaults/{vaultId}/shares:
    parameters:
      - $ref: '#/components/parameters/VaultId'
    get:
      tags: [Shares]
      summary: List active share links
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Active share links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharesListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Shares]
      summary: Create a share link
      requestBody:
        $ref: '#/components/requestBodies/ShareCreateRequest'
      responses:
        '201':
          description: Created share link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vaults/{vaultId}/shares/{shareId}:
    parameters:
      - $ref: '#/components/parameters/VaultId'
      - $ref: '#/components/parameters/ShareId'
    get:
      tags: [Shares]
      summary: Resolve a share link for a vault member
      responses:
        '200':
          description: Resolved share target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedShare'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
    delete:
      tags: [Shares]
      summary: Revoke a share link
      responses:
        '200':
          description: Share revocation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareRevokeResponse'

  /re-encryption/trigger:
    post:
      tags: [ReEncryption]
      summary: Start a user re-encryption job
      requestBody:
        $ref: '#/components/requestBodies/ReEncryptionTriggerRequest'
      responses:
        '202':
          description: Re-encryption job started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReEncryptionTriggerResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /re-encryption/{jobId}:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [ReEncryption]
      summary: Get re-encryption job status
      responses:
        '200':
          description: Re-encryption job status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReEncryptionJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    cognitoIdToken:
      type: apiKey
      in: header
      name: Authorization
      description: Cognito ID token. Plugin callers send the raw token; some key-lease paths may send a Bearer token.

  parameters:
    OrgId:
      in: path
      name: orgId
      required: true
      schema:
        type: string
    Slug:
      in: path
      name: slug
      required: true
      schema:
        type: string
    VaultId:
      in: path
      name: vaultId
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    FilePath:
      in: path
      name: path
      required: true
      description: Greedy vault-relative path segment as represented by API Gateway `{path+}`.
      schema:
        type: string
    PermissionId:
      in: path
      name: id
      required: true
      schema:
        type: string
    AlertId:
      in: path
      name: alertId
      required: true
      schema:
        type: string
    ShareId:
      in: path
      name: shareId
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    Prefix:
      in: query
      name: prefix
      required: false
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
    ContinuationToken:
      in: query
      name: continuationToken
      required: false
      schema:
        type: string

  requestBodies:
    SignupRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SignupRequest'
    AuthSessionRequest:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthSessionRequest'
    AuthRefreshRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRefreshRequest'
    AuthLogoutRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthLogoutRequest'
    ScopedKeyLeaseRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ScopedKeyLeaseRequest'
    AuthRevokeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRevokeRequest'
    SetupZkRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SetupZkRequest'
    AuthRecoverRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRecoverRequest'
    ForgotPasswordRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForgotPasswordRequest'
    ConfirmResetRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfirmResetRequest'
    RecoveryCodesStoreRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecoveryCodesStoreRequest'
    RecoveryCodeVerifyRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecoveryCodeVerifyRequest'
    VaultCreateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VaultCreateRequest'
    VaultUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VaultUpdateRequest'
    VaultMemberAddRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VaultMemberAddRequest'
    VaultMemberUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VaultMemberUpdateRequest'
    FileWriteRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileWriteRequest'
    FileSyncRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileSyncRequest'
    FileRestoreRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FileRestoreRequest'
    PermissionCreateRequest:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/PermissionMutationRequest'
              - $ref: '#/components/schemas/PermissionSetLevelRequest'
    PermissionUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PermissionUpdateRequest'
    PermissionCheckRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PermissionCheckRequest'
    PathAccessRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PathAccessRequest'
    BatchPathAccessRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchPathAccessRequest'
    AuditAlertPatchRequest:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuditAlertPatchRequest'
    AuditExportRequest:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuditExportRequest'
    AuditBridgeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuditBridgeRequest'
    UserInviteRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserInviteRequest'
    UserRoleUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserRoleUpdateRequest'
    UserProfileUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserProfileUpdateRequest'
    UserReactivateRequest:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserReactivateRequest'
    OrgSettingsUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrgSettingsUpdateRequest'
    BillingCheckoutRequest:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BillingCheckoutRequest'
    ShareCreateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ShareCreateRequest'
    ReEncryptionTriggerRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReEncryptionTriggerRequest'

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    PaymentRequired:
      description: Checkout or subscription limit required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authorization error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource or route not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Gone:
      description: Resource expired or cannot be refreshed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BillingBadRequest:
      description: Billing validation or webhook error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BillingError'
    BillingNotFound:
      description: Billing route unavailable in this edition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BillingError'

  schemas:
    JsonObject:
      type: object
      additionalProperties: true

    ApiError:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
        requestId:
          type: string
        code:
          type: string
      additionalProperties: true

    BillingError:
      type: object
      required: [message]
      properties:
        message:
          type: string
      additionalProperties: true

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
      additionalProperties: true

    FeatureMap:
      type: object
      additionalProperties:
        type: boolean

    OrgConfigResponse:
      type: object
      required: [apiEndpoint, cognitoUserPoolId, cognitoClientId, cognitoRegion, orgId, orgSlug, orgName, edition, features]
      properties:
        apiEndpoint:
          type: string
        cognitoUserPoolId:
          type: string
        cognitoClientId:
          type: string
        cognitoRegion:
          type: string
        orgId:
          type: string
        orgSlug:
          type: string
        orgName:
          type: string
        edition:
          type: string
        features:
          $ref: '#/components/schemas/FeatureMap'
      additionalProperties: true

    WellKnownConfigResponse:
      type: object
      required: [apiEndpoint, cognitoUserPoolId, cognitoClientId, cognitoRegion, orgSlug, edition, features]
      properties:
        apiEndpoint:
          type: string
        cognitoUserPoolId:
          type: string
        cognitoClientId:
          type: string
        cognitoRegion:
          type: string
        orgSlug:
          type: string
        edition:
          type: string
        features:
          $ref: '#/components/schemas/FeatureMap'
      additionalProperties: true

    SignupRequest:
      type: object
      required: [orgName, orgSlug, email, password, displayName]
      properties:
        orgName:
          type: string
        orgSlug:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        displayName:
          type: string
        turnstileToken:
          type: string
      additionalProperties: true

    SignupResponse:
      type: object
      required: [message, org, user, vault, config]
      properties:
        message:
          type: string
        org:
          type: object
          required: [slug, orgId, name, tier]
          properties:
            slug: { type: string }
            orgId: { type: string }
            name: { type: string }
            tier: { type: string }
          additionalProperties: true
        user:
          type: object
          required: [userId, email, displayName, role, loginUsername]
          properties:
            userId: { type: string }
            email: { type: string }
            displayName: { type: string }
            role: { type: string }
            loginUsername: { type: string }
          additionalProperties: true
        vault:
          type: object
          required: [vaultId, name, slug]
          properties:
            vaultId: { type: string }
            name: { type: string }
            slug: { type: string }
          additionalProperties: true
        config:
          $ref: '#/components/schemas/OrgConfigResponse'
      additionalProperties: true

    OrgSettings:
      type: object
      required:
        - orgId
        - orgName
        - syncMode
        - syncIntervalMinutes
        - enforceEncryption
        - maxSessionDurationHours
        - requireMfa
        - allowedDomains
        - retentionDays
        - autoLockMinutes
        - allowAdminPerFileRestrictions
        - disabledAuditActions
      properties:
        orgId: { type: string }
        orgName: { type: string }
        syncMode:
          type: string
          enum: [realtime, periodic, manual]
        syncIntervalMinutes: { type: integer }
        enforceEncryption: { type: boolean }
        maxSessionDurationHours: { type: integer }
        requireMfa: { type: boolean }
        allowedDomains:
          type: array
          items: { type: string }
        retentionDays: { type: integer }
        autoLockMinutes: { type: integer }
        allowAdminPerFileRestrictions: { type: boolean }
        disabledAuditActions:
          type: array
          items: { type: string }
      additionalProperties: true

    OrgSettingsUpdateRequest:
      type: object
      properties:
        orgName: { type: string }
        syncMode:
          type: string
          enum: [realtime, periodic, manual]
        syncIntervalMinutes: { type: integer }
        enforceEncryption: { type: boolean }
        maxSessionDurationHours: { type: integer }
        requireMfa: { type: boolean }
        allowedDomains:
          type: array
          items: { type: string }
        retentionDays: { type: integer }
        autoLockMinutes: { type: integer }
        allowAdminPerFileRestrictions: { type: boolean }
        disabledAuditActions:
          type: array
          items: { type: string }
      additionalProperties: true

    AuthSessionRequest:
      type: object
      properties:
        vaultId:
          type: string
          description: Optional vault used for session audit context.
      additionalProperties: true

    AuthSessionResponse:
      type: object
      required: [sessionId, userId, email, roles, expiresAt, orgSettings]
      properties:
        sessionId: { type: string }
        userId: { type: string }
        email:
          type: string
          format: email
        roles:
          type: array
          items: { type: string }
        expiresAt:
          type: string
          format: date-time
        orgSettings:
          $ref: '#/components/schemas/OrgSettings'
      additionalProperties: true

    AuthRefreshRequest:
      type: object
      required: [sessionId, refreshToken]
      properties:
        sessionId: { type: string }
        refreshToken: { type: string }
        leaseId: { type: string }
      additionalProperties: true

    AuthRefreshResponse:
      type: object
      required: [sessionId, expiresAt, keyLease, orgSettings]
      properties:
        sessionId: { type: string }
        expiresAt:
          type: string
          format: date-time
        keyLease:
          $ref: '#/components/schemas/KeyLease'
        orgSettings:
          $ref: '#/components/schemas/OrgSettings'
      additionalProperties: true

    AuthLogoutRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId: { type: string }
        vaultId: { type: string }
      additionalProperties: true

    AuthLogoutResponse:
      type: object
      required: [message, cacheWipe, sessionId, revokedLeases]
      properties:
        message: { type: string }
        cacheWipe: { type: boolean }
        sessionId: { type: string }
        revokedLeases: { type: integer }
      additionalProperties: true

    KeyLease:
      type: object
      required: [key, encryptedDataKey, expiresAt, refreshToken, leaseId, algorithm, offlineCapable, scope, vaultId]
      properties:
        key: { type: string }
